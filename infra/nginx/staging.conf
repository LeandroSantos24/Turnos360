# Nginx — STAGING (UM-Cloud, acceso por VPN ZeroTier).
#
# HTTP plano a propósito: la instancia no es alcanzable desde internet, así
# que Let's Encrypt no puede emitir certificado (su desafío HTTP-01 necesita
# llegar al puerto 80 desde afuera). El tráfico igual viaja cifrado por el
# túnel de ZeroTier. Para producción con dominio real, usar
# produccion.conf.ejemplo (mismo archivo + TLS).
#
# Todo entra por un solo origen (el puerto 80 de esta instancia):
#   /      -> frontend (Next.js)
#   /api/  -> backend  (FastAPI, se le quita el prefijo /api)
# Así no hace falta CORS ni un segundo puerto publicado.

upstream backend_up {
    server backend:8000;
}

upstream frontend_up {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # Subidas (logo del negocio, fotos de la vidriera).
    client_max_body_size 12m;

    # Que Nginx no se cuelgue esperando a un backend caído.
    proxy_connect_timeout 10s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # No anunciar la versión de Nginx.
    server_tokens off;

    # ── API ──────────────────────────────────────────────────
    # La barra final de proxy_pass es la que ELIMINA el prefijo /api:
    #   /api/auth/login  ->  backend:8000/auth/login
    location /api/ {
        proxy_pass http://backend_up/;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        # X-Forwarded-For es lo que hace que el rate limit por IP funcione:
        # sin esto, slowapi ve la IP de Nginx para TODOS los visitantes.
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Las respuestas de la API nunca se cachean.
        proxy_buffering off;
    }

    # ── Frontend (Next.js) ───────────────────────────────────
    location / {
        proxy_pass http://frontend_up;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Hot-reload / websockets de Next (no molesta en producción).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Assets estáticos de Next: cache larga (llevan hash en el nombre).
    location /_next/static/ {
        proxy_pass http://frontend_up;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

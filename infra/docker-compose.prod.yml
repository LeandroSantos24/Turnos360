# Turnos360 — stack de PRODUCCIÓN / STAGING.
#
# Diferencias clave con infra/docker-compose.yml (desarrollo):
#   · db y redis NO publican puertos: viven solo en la red interna de Docker.
#     En dev daba igual; en un servidor con IP alcanzable, publicarlos es
#     regalar la base de datos y el broker de Celery al mundo.
#   · Sin bind mounts del código: la imagen es inmutable (lo que probaste es
#     lo que corre). Para cambiar código hay que rebuildear, a propósito.
#   · uvicorn sin --reload, con varios workers y --proxy-headers (para que el
#     rate limit vea la IP real del visitante y no la de Nginx).
#   · ENV=prod: activa el fail-fast de SECRET_KEY/FERNET_KEY y el HSTS.
#   · Redis con contraseña (defensa en profundidad).
#   · Solo Nginx publica puertos al servidor.
#
# Uso:
#   docker compose --env-file .env.prod -f infra/docker-compose.prod.yml up -d --build

name: turnos360-prod

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # SIN ports: solo alcanzable desde la red interna del compose.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # SIN ports. Además con contraseña: si algún día alguien entra a la red
    # interna, tampoco puede encolar tareas de Celery a mano.
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment: &backend_env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENV: prod
      SECRET_KEY: ${SECRET_KEY}
      FERNET_KEY: ${FERNET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      API_BASE_URL: ${API_BASE_URL}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL:-}
      SUPERADMIN_PASS: ${SUPERADMIN_PASS:-}
    # --proxy-headers + --forwarded-allow-ips: uvicorn confía en el
    # X-Forwarded-For que manda Nginx, así slowapi limita por IP REAL.
    # Sin esto, todos los visitantes comparten la IP de Nginx y el límite
    # de login se vuelve global (un atacante bloquea a todos tus clientes).
    # "*" es seguro acá porque el backend no publica puertos: lo único que
    # puede llegarle es Nginx.
    command: >
      uvicorn app.main:app
      --host 0.0.0.0 --port 8000
      --workers ${UVICORN_WORKERS:-2}
      --proxy-headers --forwarded-allow-ips="*"
      --no-access-log
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment: *backend_env
    command: celery -A app.celery_app worker --loglevel=warning --concurrency=2
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment: *backend_env
    # --schedule fuera del código: el archivo de estado del beat es runtime,
    # no fuente (por eso también salió del repo).
    command: celery -A app.celery_app beat --loglevel=warning --schedule /tmp/celerybeat-schedule
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        # OJO: NEXT_PUBLIC_API_URL se hornea en el bundle EN BUILD TIME.
        # Si cambiás esta variable, hay que rebuildear el frontend
        # (docker compose ... up -d --build frontend). Cambiarla y solo
        # reiniciar NO tiene efecto.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      # Esta sí es de runtime: la usa el sitemap, que corre server-side
      # dentro del contenedor y llega al backend por la red interna.
      API_URL_INTERNA: http://backend:8000
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # El ÚNICO servicio que publica puertos al servidor.
    ports:
      - "80:80"
      # Descomentar en producción con TLS real (ver nginx/produccion.conf.ejemplo)
      # - "443:443"
    volumes:
      - ./nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
      # Para producción con Let's Encrypt, montar también:
      # - ./certbot/conf:/etc/letsencrypt:ro
      # - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
